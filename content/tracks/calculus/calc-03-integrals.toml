text = "Delta_x = 0.5. Evaluate f at x = 0, 0.5, 1, 1.5. Sum: (0 + 0.25 + 1 + 2.25) * 0.5."

[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
You are asked to evaluate the integral of 1/(1+x^2) from 0 to 1. You
do not immediately recognise the antiderivative. What strategy should
you try first?
"""
correct_strategy = "recast"
distractors = ["contradiction", "pigeonhole", "extreme-principle"]
explanation = """
Recast the integrand by recognising it as the derivative of arctan(x).
Changing representation from 'unfamiliar integrand' to 'known derivative'
is the core move for evaluating integrals analytically.
"""
points = 10

[[solve.sub_problems]]
kind = "proof"
prompt = """
Prove Part 1 of the Fundamental Theorem of Calculus: if f is continuous
on [a,b] and F(x) = integral from a to x of f(t) dt, then F'(x) = f(x).
"""
solution_sketch = """
By definition: F'(x) = lim_{h->0} (F(x+h) - F(x))/h
= lim_{h->0} (1/h) * integral from x to x+h of f(t) dt.

By the Mean Value Theorem for integrals, there exists c in [x, x+h]
such that integral from x to x+h of f(t) dt = f(c) * h.

So F'(x) = lim_{h->0} f(c) * h / h = lim_{h->0} f(c).

As h -> 0, c -> x, and since f is continuous, f(c) -> f(x).
Therefore F'(x) = f(x). QED.
"""
points = 20

[[solve.sub_problems.rubric]]
criterion = "Wrote F'(x) as the limit of the difference quotient"
weight = 3

[[solve.sub_problems.rubric]]
criterion = "Expressed the numerator as an integral from x to x+h"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Applied the Mean Value Theorem for integrals"
weight = 5

[[solve.sub_problems.rubric]]
criterion = "Used continuity of f to conclude F'(x) = f(x)"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Reasoning is clear and complete"
weight = 4
