"""
answer = 0.295520
tolerance = 0.0001
points = 15

[[solve.sub_problems.hints]]
cost = 3
text = "0.3 - 0.027/6 + 0.00243/120 = 0.3 - 0.0045 + 0.00002025."

[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
You want to find the Taylor series of f(x) = 1/(1-x) but computing
derivatives gets tedious. What strategy helps you find the pattern
quickly?
"""
correct_strategy = "get-hands-dirty"
distractors = ["contradiction", "pigeonhole", "invariant"]
explanation = """
Compute the first few derivatives directly: f(0) = 1, f'(0) = 1,
f''(0) = 2, f'''(0) = 6. The pattern f^{(n)}(0) = n! becomes clear,
giving the geometric series 1 + x + x^2 + x^3 + ... Getting your hands
dirty with small cases reveals the pattern.
"""
points = 10

[[solve.sub_problems]]
kind = "proof"
prompt = """
Prove that the Maclaurin series 1 + x + x^2 + x^3 + ... converges to
1/(1-x) for |x| < 1.
"""
solution_sketch = """
The partial sum S_n = 1 + x + x^2 + ... + x^{n-1} = (1 - x^n)/(1 - x)
for x != 1 (geometric series formula).

For |x| < 1, x^n -> 0 as n -> infinity.

Therefore lim_{n->inf} S_n = lim_{n->inf} (1 - x^n)/(1 - x) = 1/(1 - x).

The series diverges for |x| >= 1 since |x^n| does not tend to 0. QED.
"""
points = 15

[[solve.sub_problems.rubric]]
criterion = "Stated the closed form for the partial sum"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Showed x^n -> 0 for |x| < 1"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Took the limit to obtain 1/(1-x)"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Noted the radius of convergence |x| < 1"
weight = 3
