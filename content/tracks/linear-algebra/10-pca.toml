id = "la-10-pca"
title = "PCA and Dimensionality Reduction"
track = "linear-algebra"
tier = "advanced"
prerequisites = ["la-05-eigenvalues", "la-06-inner-products"]
strategy_tags = ["recast", "penultimate-step", "get-hands-dirty"]
concept_tags = ["pca", "eigenvalue", "positive-definite", "spectral-theorem"]

[spark]
scenario = """
A genomics dataset has 20,000 features (gene expression levels) per
patient but only 200 patients. Training a classifier directly on 20,000
dimensions is hopeless: overfitting, slow training, and uninterpretable
models. PCA projects the data onto the directions of maximum variance,
reducing 20,000 dimensions to perhaps 50 while retaining 95% of the
signal. Every ML pipeline from face recognition to finance uses PCA (or
its variants) as a preprocessing step.
"""
industry_domain = "bioinformatics"
connection_question = "Why are the directions of maximum variance the 'best' directions to keep? What information do the discarded directions contain?"

[ground]
concept_brief = """
PCA finds the orthonormal directions (principal components) along which
the data varies most. Mathematically, it computes the eigendecomposition
of the covariance matrix C = (1/(n-1)) X^T X. The eigenvectors are the
principal component directions, and the eigenvalues are the variances
along those directions. Since C is symmetric positive semi-definite, the
spectral theorem guarantees real non-negative eigenvalues and orthogonal
eigenvectors.
"""
intuition = """
Imagine a cloud of data points shaped like a squashed rugby ball. The
longest axis of the ball captures the most spread (variance). The second
longest axis, perpendicular to the first, captures the next most. PCA
finds these axes. By projecting onto the top k axes, you keep the shape
of the ball while discarding the thin, noisy directions. The spectral
theorem ensures these axes exist and are perpendicular.
"""
field_tags = ["linear-algebra"]

[[ground.definitions]]
term = "Principal Component"
statement = "The i-th principal component is the i-th eigenvector of the covariance matrix, ordered by decreasing eigenvalue."

[[ground.definitions]]
term = "Explained Variance Ratio"
statement = "lambda_i / sum(lambda_j): the fraction of total variance captured by the i-th principal component."

[[ground.definitions]]
term = "Covariance Matrix"
statement = "C = (1/(n-1)) X^T X for centred data X. It is symmetric positive semi-definite."

[[ground.connections]]
target_concept = "svd"
relationship = "PCA can be computed via the SVD of the centred data matrix: principal components are right singular vectors, and eigenvalues of C are sigma_i^2 / (n-1)."

[[ground.connections]]
target_concept = "positive-definite"
relationship = "The covariance matrix is always positive semi-definite (all eigenvalues >= 0), and strictly positive definite when the data spans all dimensions."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
A dataset has covariance matrix eigenvalues [10, 5, 3, 1, 0.5, 0.3,
0.2]. What is the explained variance ratio of the first two principal
components combined? Give your answer to 3 decimal places.
"""
answer = 0.750
tolerance = 0.001
points = 10

[[solve.sub_problems.hints]]
cost = 3
text = "Sum of all eigenvalues = 20. First two = 15. Ratio = 15/20 = 0.75."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
A centred data matrix X is 1000x50 (1000 samples, 50 features). The
covariance matrix C = (1/999) X^T X is 50x50. What is the maximum
number of nonzero eigenvalues C can have?
"""
answer = 50.0
tolerance = 0.0
points = 10

[[solve.sub_problems.hints]]
cost = 3
text = "C is 50x50, so it has at most 50 eigenvalues. But also rank(X) <= min(1000, 50) = 50. So at most 50 nonzero eigenvalues."

[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
Your covariance matrix is 50000 x 50000 but you only need the top 100
principal components. Computing the full eigendecomposition is
infeasible. Which strategy guides your approach?
"""
correct_strategy = "penultimate-step"
distractors = ["draw-picture", "contradiction", "symmetry"]
explanation = """
Penultimate step: the step just before having the top 100 eigenvectors
is having a way to multiply the covariance matrix by a vector cheaply.
Iterative methods (Lanczos, randomised SVD) only need matrix-vector
products, not the full decomposition. They converge to the top k
eigenvectors in O(k) iterations. The insight is to identify the minimal
operation the algorithm needs (a matrix-vector product) and avoid
computing anything more.
"""
points = 10

[[solve.sub_problems]]
kind = "proof"
prompt = """
Prove that the first principal component w_1 (unit vector) maximises the
variance of the projected data: w_1 = argmax_{||w||=1} w^T C w, where
C is the covariance matrix.
"""
solution_sketch = """
By the spectral theorem, C = sum lambda_i q_i q_i^T where {q_i} are
orthonormal eigenvectors. For any unit vector w, write w = sum a_i q_i
with sum a_i^2 = 1. Then w^T C w = sum a_i^2 lambda_i. This is a
weighted average of eigenvalues with weights summing to 1. It is
maximised when all weight is on the largest eigenvalue: a_1 = 1 and
a_i = 0 for i > 1, giving w = q_1 and maximum value lambda_1. QED.
"""
points = 15

[[solve.sub_problems.rubric]]
criterion = "Applied the spectral theorem to decompose C"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Expressed w in the eigenbasis and computed w^T C w"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Identified the optimisation as maximising a weighted sum with constrained weights"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Concluded the maximum is lambda_1 achieved by the first eigenvector"
weight = 3
