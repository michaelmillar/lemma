id = "la-07-least-squares"
title = "Least Squares and Linear Regression"
track = "linear-algebra"
tier = "core"
prerequisites = ["la-06-inner-products"]
strategy_tags = ["penultimate-step", "get-hands-dirty", "recast"]
concept_tags = ["least-squares", "projection", "inner-product"]

[spark]
scenario = """
Every data scientist's first model is linear regression: given noisy
data points, find the line (or hyperplane) of best fit. The 'best' fit
minimises the sum of squared errors, which is exactly the least-squares
problem: find x that minimises ||Ax - b||^2. This is not just a
statistical recipe; it is the orthogonal projection of b onto the column
space of A. The normal equations A^T A x = A^T b are solved billions of
times daily in ML pipelines worldwide.
"""
industry_domain = "data_science"
connection_question = "Why does minimising squared errors give the projection onto the column space? What goes wrong if you minimise absolute errors instead?"

[ground]
concept_brief = """
When Ax = b has no exact solution (b is not in the column space of A),
the least-squares solution x_hat minimises ||Ax - b||^2. Geometrically,
Ax_hat is the orthogonal projection of b onto Col(A). The solution
satisfies the normal equations: A^T A x = A^T b. When A^T A is
invertible, x_hat = (A^T A)^{-1} A^T b.
"""
intuition = """
Imagine b is a point floating above a plane (the column space of A).
The least-squares solution drops a perpendicular from b down to the
plane. The foot of the perpendicular is Ax_hat, and the residual b -
Ax_hat is orthogonal to the plane. This is why the problem reduces to
orthogonal projection: you are finding the closest point in the column
space to b.
"""
field_tags = ["linear-algebra"]

[[ground.definitions]]
term = "Normal Equations"
statement = "A^T A x = A^T b. The system whose solution gives the least-squares minimiser."
latex = "A^T A \\hat{x} = A^T b"

[[ground.definitions]]
term = "Residual"
statement = "The vector r = b - Ax_hat. It is orthogonal to every column of A."

[[ground.definitions]]
term = "Condition Number"
statement = "The ratio sigma_max / sigma_min of a matrix. A large condition number means the least-squares solution is sensitive to small perturbations in the data."

[[ground.connections]]
target_concept = "svd"
relationship = "The SVD provides a numerically stable way to solve least squares: x_hat = V * Sigma^{-1} * U^T * b, avoiding forming A^T A."

[[ground.connections]]
target_concept = "positive-definite"
relationship = "When A has full column rank, A^T A is positive definite, guaranteeing the normal equations have a unique solution."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
You have 3 data points: (1,2), (2,3), (3,6). Fitting y = mx (no
intercept), set up the normal equation: (sum x_i^2) * m = sum x_i*y_i.
What is the least-squares estimate of m? Give your answer to 3 decimal
places.
"""
answer = 2.571
tolerance = 0.001
points = 10

[[solve.sub_problems.hints]]
cost = 3
text = "sum x_i^2 = 1+4+9 = 14. sum x_i*y_i = 2+6+18 = 26. m = 26/14 = 13/7."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
Matrix A is 100x5 with full column rank. How many free parameters does
the least-squares solution x_hat have?
"""
answer = 0.0
tolerance = 0.0
points = 10

[[solve.sub_problems.hints]]
cost = 3
text = "Full column rank means A^T A is 5x5 and invertible, so x_hat is unique: zero free parameters."

[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
The normal equations A^T A x = A^T b are ill-conditioned because A^T A
squares the condition number. Which strategy leads to a more stable
computation?
"""
correct_strategy = "recast"
distractors = ["contradiction", "draw-picture", "invariant"]
explanation = """
Recast: instead of forming A^T A (which squares the condition number),
recast the problem via the QR decomposition A = QR or the SVD A = U
Sigma V^T. Then Rx = Q^T b (from QR) or x = V Sigma^{-1} U^T b (from
SVD), both numerically stable. The underlying maths is the same but the
computation is reframed to avoid amplifying errors.
"""
points = 10

[[solve.sub_problems]]
kind = "proof"
prompt = """
Prove that the residual r = b - Ax_hat is orthogonal to every column
of A, i.e., A^T(b - Ax_hat) = 0.
"""
solution_sketch = """
x_hat minimises f(x) = ||Ax - b||^2 = (Ax-b)^T(Ax-b) = x^T A^T A x -
2b^T A x + b^T b. Taking the gradient and setting it to zero:
grad_x f = 2 A^T A x - 2 A^T b = 0, so A^T A x_hat = A^T b.
Rearranging: A^T(Ax_hat - b) = 0, i.e., A^T(b - Ax_hat) = 0.
Therefore the residual is orthogonal to every column of A. QED.
"""
points = 15

[[solve.sub_problems.rubric]]
criterion = "Wrote out the squared error as a function of x"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Computed the gradient and set it to zero"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Derived the normal equations A^T A x = A^T b"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Interpreted the result as orthogonality of the residual"
weight = 3
