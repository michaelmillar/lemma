id = "prob-04-variance"
title = "Variance and Risk Assessment"
track = "probability"
tier = "foundation"
prerequisites = ["prob-03-expected-value"]
strategy_tags = ["get-hands-dirty", "recast"]
concept_tags = ["variance", "standard-deviation", "expected-value"]

[spark]
scenario = """
Two investment portfolios both have an expected annual return of 8%.
Portfolio A has returns that fluctuate between 6% and 10%. Portfolio B
swings between -5% and 21%. A risk manager needs to quantify which is
'safer'. Expected value alone cannot distinguish them.
"""
industry_domain = "finance"
connection_question = "Both portfolios have the same mean return. What additional measure would capture the difference in risk?"

[ground]
concept_brief = """
Variance Var(X) = E[(X - E[X])^2] measures the average squared deviation
from the mean. Standard deviation is its square root, giving a spread
measure in the same units as the data. Together with expected value,
variance gives a two-number summary of a distribution.
"""
intuition = """
If expected value tells you where the centre is, variance tells you how
wide the scatter around that centre is. A low variance means outcomes
cluster tightly around the mean; high variance means they spread widely.
Squaring the deviations ensures positive and negative deviations do not
cancel out.
"""
field_tags = ["probability", "statistics"]

[[ground.definitions]]
term = "Variance"
statement = "Var(X) = E[(X - E[X])^2] = E[X^2] - (E[X])^2."
latex = "\\text{Var}(X) = E[(X - \\mu)^2] = E[X^2] - \\mu^2"

[[ground.definitions]]
term = "Standard Deviation"
statement = "SD(X) = sqrt(Var(X)), measured in the same units as X."
latex = "\\sigma = \\sqrt{\\text{Var}(X)}"

[[ground.connections]]
target_concept = "concentration-inequality"
relationship = "Concentration inequalities bound the probability of large deviations from the mean using variance."

[[ground.connections]]
target_concept = "normal-distribution"
relationship = "The normal distribution is fully characterised by its mean and variance."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
A random variable X takes values 1, 2, 3 each with probability 1/3.
Compute Var(X). Round to 4 decimal places.
"""
answer = 0.6667
tolerance = 0.001
points = 15

[[solve.sub_problems.hints]]
cost = 3
text = "First compute E[X] = (1+2+3)/3 = 2. Then E[X^2] = (1+4+9)/3 = 14/3."

[[solve.sub_problems.hints]]
cost = 5
text = "Var(X) = E[X^2] - (E[X])^2 = 14/3 - 4 = 2/3."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
If X and Y are independent with Var(X) = 4 and Var(Y) = 9, what is
Var(X + Y)?
"""
answer = 13.0
tolerance = 0.01
points = 10

[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
You need to prove that Var(X) >= 0 for any random variable X. Which
approach is most direct?
"""
correct_strategy = "direct-proof"
distractors = ["contradiction", "induction", "pigeonhole"]
explanation = """
Var(X) = E[(X-mu)^2]. Since (X-mu)^2 >= 0 always, and the expected value
of a non-negative quantity is non-negative, Var(X) >= 0. This is a
one-line direct proof from the definition.
"""
points = 10

[[solve.sub_problems]]
kind = "proof"
prompt = """
Prove the computational formula: Var(X) = E[X^2] - (E[X])^2 starting
from the definition Var(X) = E[(X - E[X])^2].
"""
solution_sketch = """
Let mu = E[X]. Then:
Var(X) = E[(X - mu)^2]
       = E[X^2 - 2*mu*X + mu^2]
       = E[X^2] - 2*mu*E[X] + mu^2     (by linearity of expectation)
       = E[X^2] - 2*mu^2 + mu^2
       = E[X^2] - mu^2
       = E[X^2] - (E[X])^2.  QED.
"""
points = 15

[[solve.sub_problems.rubric]]
criterion = "Expanded (X - mu)^2 correctly"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Applied linearity of expectation to each term"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Simplified using mu = E[X]"
weight = 4

[[solve.sub_problems.rubric]]
criterion = "Final expression matches E[X^2] - (E[X])^2"
weight = 3
