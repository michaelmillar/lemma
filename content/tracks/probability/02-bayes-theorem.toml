[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
A problem asks: 'In a tournament of 7 chess players, prove there exist two
players who have played the same number of games.' Which tactic applies?
"""
correct_strategy = "pigeonhole"
distractors = ["symmetry", "extreme-principle", "invariant"]
explanation = """
Each player can have played 0 to 6 games, giving 7 possible values. But
0 and 6 cannot coexist (if someone played everyone, no one played nobody).
So at most 6 distinct values for 7 players: pigeonhole.
"""
points = 10

[[solve.sub_problems]]
kind = "proof"
prompt = """
Prove that for any events A and B with P(B) > 0:
  P(A|B) = P(B|A) * P(A) / P(B)
starting from the definition of conditional probability.
"""
solution_sketch = """
By definition, P(A|B) = P(A intersection B) / P(B).
Also P(B|A) = P(A intersection B) / P(A), so P(A intersection B) = P(B|A) * P(A).
Substituting: P(A|B) = P(B|A) * P(A) / P(B). QED.
"""
exemplar = """
Proof. Let A and B be events with P(B) > 0.

By the definition of conditional probability:
  P(A|B) = P(A intersection B) / P(B)              ... (1)

We also know that P(B|A) is defined when P(A) > 0:
  P(B|A) = P(A intersection B) / P(A)

Rearranging gives:
  P(A intersection B) = P(B|A) * P(A)              ... (2)

Substituting (2) into (1):
  P(A|B) = P(B|A) * P(A) / P(B)

When P(A) = 0, both sides equal 0, so the identity holds trivially. QED.
"""
points = 20

