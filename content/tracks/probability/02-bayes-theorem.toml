id = "prob-02-bayes-theorem"
title = "Bayes' Theorem and Spam Filtering"
track = "probability"
tier = "foundation"
prerequisites = ["prob-01-sample-spaces"]
strategy_tags = ["get-hands-dirty", "draw-picture"]
concept_tags = ["conditional-probability", "bayes-theorem", "prior", "posterior", "likelihood", "law-of-total-probability"]

[spark]
scenario = """
A spam filter at an email provider classifies 100 million messages per day.
The filter has a 98% true positive rate and a 1% false positive rate. Only
2% of all email is actually spam. When the filter flags a message, what is
the probability it is truly spam?
"""
industry_domain = "ml_engineering"
connection_question = "Before computing: do you expect the answer to be close to 98%, or much lower? Why?"

[ground]
concept_brief = """
Bayes' theorem inverts conditional probabilities: it lets you compute
P(cause | evidence) from P(evidence | cause), the prior P(cause), and
the marginal P(evidence). It is the mathematical backbone of every
classifier, medical test interpretation, and belief update in AI.
"""
intuition = """
Think of Bayes' theorem as an update rule. You start with a prior belief
(2% of email is spam), observe evidence (the filter flagged it), and
update to a posterior belief. The surprise is base-rate neglect: even a
good filter produces many false positives when the prior is low.
"""
field_tags = ["probability", "statistics", "information-theory"]

[[ground.definitions]]
term = "Conditional Probability"
statement = "P(A|B) = P(A and B) / P(B), provided P(B) > 0."
latex = "P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}"

[[ground.definitions]]
term = "Bayes' Theorem"
statement = "P(A|B) = P(B|A) * P(A) / P(B)"
latex = "P(A \\mid B) = \\frac{P(B \\mid A) \\, P(A)}{P(B)}"

[[ground.definitions]]
term = "Prior Probability"
statement = "The initial belief about an event before observing evidence."

[[ground.definitions]]
term = "Law of Total Probability"
statement = "P(B) = P(B|A)*P(A) + P(B|not A)*P(not A) for any event A."

[[ground.connections]]
target_concept = "sample-space"
relationship = "Bayes' theorem operates on events within a sample space, partitioning it by the conditioning event."

[[ground.connections]]
target_concept = "expected-value"
relationship = "Bayesian decision theory combines posterior probabilities with utility functions via expected value."

[work]
worked_example = """
Problem: A factory has two machines. Machine A produces 60% of output with
a 3% defect rate. Machine B produces 40% with a 5% defect rate. A random
item is defective. What is the probability it came from Machine A?

Step 1: Identify the pieces.
  P(A) = 0.60, P(B) = 0.40
  P(defect|A) = 0.03, P(defect|B) = 0.05

Step 2: Compute P(defect) using total probability.
  P(defect) = P(defect|A)*P(A) + P(defect|B)*P(B)
            = 0.03*0.60 + 0.05*0.40
            = 0.018 + 0.020 = 0.038

Step 3: Apply Bayes' theorem.
  P(A|defect) = P(defect|A)*P(A) / P(defect)
              = 0.018 / 0.038
              = 0.4737
"""
guided_prompt = """
Same factory, different numbers. Machine A produces 70% of output with a
2% defect rate. Machine B produces 30% with a 6% defect rate. A random
item is defective. What is P(A|defect)? Round to 4 decimal places.

(Hint: follow the same three steps as the worked example above.)
"""
guided_answer = 0.4375
guided_tolerance = 0.001

