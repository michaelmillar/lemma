[[solve.sub_problems.comprehension]]
question = "The proof requires P(A) > 0 as a precondition for all cases."
answer = false
explanation = "The proof handles P(A) = 0 as a trivial case where both sides are 0. Only P(B) > 0 is strictly required."

[[solve.sub_problems.comprehension]]
question = "The key step is expressing P(A intersection B) using two different conditional probability definitions."
answer = true
explanation = "This is the core algebraic move: writing the same joint probability two ways and substituting one into the other."

[[solve.sub_problems.comprehension]]
question = "Bayes' theorem can be derived without using the definition of conditional probability."
answer = false
explanation = "The definition P(A|B) = P(A intersection B)/P(B) is the starting point. Without it, there is no algebraic handle."
