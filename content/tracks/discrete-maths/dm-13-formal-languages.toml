id = "dm-13-formal-languages"
title = "Formal Languages and Parsing"
track = "discrete-maths"
tier = "research"
prerequisites = ["dm-04-recurrences"]
strategy_tags = ["draw-picture", "recast", "get-hands-dirty"]
concept_tags = ["formal-language", "automaton"]

[spark]
scenario = """
A compiler frontend reads source code and decides whether it is syntactically
valid. Regular expressions handle lexing (tokenisation), while context-free
grammars handle parsing (syntax structure). These correspond to two levels of
the Chomsky hierarchy, each recognised by a different class of automaton.
Why can't a regular expression match balanced parentheses?
"""
industry_domain = "compiler_engineering"
connection_question = "Your favourite text editor supports 'regex'. Are those truly regular expressions in the formal sense?"

[ground]
concept_brief = """
A formal language is a set of strings over a finite alphabet. The Chomsky
hierarchy classifies languages by generative power: regular (Type 3),
context-free (Type 2), context-sensitive (Type 1), and recursively enumerable
(Type 0). Each level corresponds to an automaton: finite automata recognise
regular languages, pushdown automata recognise context-free languages, and
Turing machines recognise recursively enumerable languages. The pumping lemma
is a tool for proving a language is NOT regular.
"""
intuition = """
A finite automaton has a fixed amount of memory (its states). It cannot count
to arbitrary n, so it cannot match 'n open brackets followed by n close
brackets'. A pushdown automaton adds a stack, giving it unbounded memory in
one direction, enough for balanced brackets. A Turing machine adds a
read-write tape, giving full computational power.
"""
field_tags = ["formal-languages", "automata-theory", "theoretical-computer-science"]

[[ground.definitions]]
term = "Regular Language"
statement = "A language recognised by a deterministic finite automaton (DFA). Equivalently, described by a regular expression."

[[ground.definitions]]
term = "Context-Free Language"
statement = "A language generated by a context-free grammar. Recognised by a nondeterministic pushdown automaton."

[[ground.definitions]]
term = "Chomsky Hierarchy"
statement = "A classification of formal languages into four types (0-3) by increasing restrictiveness of their grammars."

[[ground.definitions]]
term = "Pumping Lemma (Regular)"
statement = "If L is regular, then sufficiently long strings in L can be 'pumped' (a middle portion repeated) while staying in L. Used to prove non-regularity."

[[ground.connections]]
target_concept = "recurrence-relation"
relationship = "The number of strings of length n in a regular language satisfies a linear recurrence whose characteristic roots come from the DFA's structure."

[[ground.connections]]
target_concept = "complexity-class"
relationship = "Language recognition corresponds to decision problems, connecting the Chomsky hierarchy to complexity classes."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
A DFA over alphabet {a,b} has 3 states: q0 (start, accepting), q1, q2
(rejecting sink). Transitions: q0 --a--> q1, q0 --b--> q0, q1 --a--> q2,
q1 --b--> q0, q2 --a--> q2, q2 --b--> q2. How many strings of length 3 does
this DFA accept?
"""
answer = 3
tolerance = 0
points = 20

[[solve.sub_problems.hints]]
cost = 5
text = "Enumerate all 8 paths of length 3 from q0. A string is accepted if the path ends in q0."

[[solve.sub_problems.hints]]
cost = 10
text = "bbb: q0->q0->q0->q0 (accept). bab: q0->q0->q1->q0 (accept). abb: q0->q1->q0->q0 (accept). The remaining 5 strings end in q1 or q2 (reject). Answer: 3."

[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
To prove that the language L = {a^n b^n : n >= 0} is not regular, which
technique is used?
"""
correct_strategy = "contradiction"
distractors = ["induction", "bijection", "invariant"]
explanation = """
Assume L is regular, then apply the pumping lemma to derive a contradiction:
pumping the string a^p b^p produces a string not in L, contradicting the
assumption.
"""
points = 10

[[solve.sub_problems]]
kind = "numerical"
prompt = """
How many states does the minimal DFA recognising the language 'all binary
strings whose length is divisible by 3' have? (Alphabet is {0,1}.)
"""
answer = 3
tolerance = 0
points = 15

[[solve.sub_problems.hints]]
cost = 5
text = "Track the length modulo 3. States: 0, 1, 2 (corresponding to length mod 3). Accept state: 0."

[[solve.sub_problems]]
kind = "proof"
prompt = """
Use the pumping lemma to prove that L = {a^n b^n : n >= 0} is not regular.
"""
solution_sketch = """
Assume L is regular with pumping length p. Consider the string s = a^p b^p,
which is in L and has length 2p >= p. By the pumping lemma, s = xyz where
|xy| <= p, |y| >= 1, and xy^i z is in L for all i >= 0. Since |xy| <= p,
y consists entirely of a's: y = a^k for some k >= 1. Pumping to i = 2 gives
xy^2 z = a^{p+k} b^p, but p+k != p so this string is not in L. Contradiction.
Therefore L is not regular.
"""
points = 20

[[solve.sub_problems.rubric]]
criterion = "Assumed L is regular and invoked the pumping lemma"
weight = 5

[[solve.sub_problems.rubric]]
criterion = "Chose an appropriate string s = a^p b^p"
weight = 5

[[solve.sub_problems.rubric]]
criterion = "Argued y consists only of a's due to |xy| <= p"
weight = 5

[[solve.sub_problems.rubric]]
criterion = "Derived a contradiction by pumping"
weight = 5

[[solve.sub_problems]]
kind = "numerical"
prompt = """
The Chomsky hierarchy has 4 types. A context-free grammar is Type 2. What
type number is a regular grammar?
"""
answer = 3
tolerance = 0
points = 10

[[solve.sub_problems.hints]]
cost = 5
text = "Type 0: unrestricted. Type 1: context-sensitive. Type 2: context-free. Type 3: regular."
