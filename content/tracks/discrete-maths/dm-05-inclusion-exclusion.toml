id = "dm-05-inclusion-exclusion"
title = "Inclusion-Exclusion and Bug Triage"
track = "discrete-maths"
tier = "core"
prerequisites = ["dm-01-counting"]
strategy_tags = ["draw-picture", "get-hands-dirty", "change-viewpoint"]
concept_tags = ["inclusion-exclusion", "counting", "combinatorics"]

[spark]
scenario = """
A QA dashboard tracks bugs across three platforms: Windows, macOS, and Linux.
Of 200 bugs total, 120 affect Windows, 90 affect macOS, 70 affect Linux,
40 affect both Windows and macOS, 30 affect both Windows and Linux, 20 affect
both macOS and Linux, and 10 affect all three. How many bugs affect at least
one platform?
"""
industry_domain = "software_engineering"
connection_question = "What would go wrong if you simply added 120 + 90 + 70?"

[ground]
concept_brief = """
The inclusion-exclusion principle (PIE) computes the size of a union of sets
by alternately adding and subtracting intersection sizes:
|A Ôł¬ B Ôł¬ C| = |A| + |B| + |C| - |AÔłęB| - |AÔłęC| - |BÔłęC| + |AÔłęBÔłęC|.
It corrects for over-counting when elements belong to multiple sets. The
principle generalises to n sets with 2^n - 1 terms.
"""
intuition = """
Picture a Venn diagram of three overlapping circles. Adding the three circles
counts elements in two-way overlaps twice and elements in the three-way
overlap three times. Subtracting pairwise intersections removes one copy of
each double-count but also removes the triple overlap entirely. Adding it
back once restores it to the correct count of one.
"""
field_tags = ["combinatorics", "discrete-mathematics", "set-theory"]

[[ground.definitions]]
term = "Inclusion-Exclusion Principle (2 sets)"
statement = "|A Ôł¬ B| = |A| + |B| - |A Ôłę B|."

[[ground.definitions]]
term = "Inclusion-Exclusion Principle (3 sets)"
statement = "|A Ôł¬ B Ôł¬ C| = |A|+|B|+|C| - |AÔłęB| - |AÔłęC| - |BÔłęC| + |AÔłęBÔłęC|."

[[ground.definitions]]
term = "Derangement"
statement = "A permutation with no fixed points. The count D(n) = n! * sum_{k=0}^{n} (-1)^k / k! is derived via inclusion-exclusion."

[[ground.connections]]
target_concept = "counting"
relationship = "Inclusion-exclusion extends basic counting to overlapping sets."

[[ground.connections]]
target_concept = "binomial-coefficient"
relationship = "The general inclusion-exclusion formula has C(n,k) intersection terms of size k."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
Using the bug triage scenario: W=120, M=90, L=70, WÔłęM=40, WÔłęL=30,
MÔłęL=20, WÔłęMÔłęL=10. How many bugs affect at least one platform?
"""
answer = 200
tolerance = 0
points = 15

[[solve.sub_problems.hints]]
cost = 5
text = "Apply PIE: 120+90+70 - 40-30-20 + 10."

[[solve.sub_problems.hints]]
cost = 10
text = "280 - 90 + 10 = 200."

[[solve.sub_problems]]
kind = "numerical"
prompt = """
How many integers from 1 to 100 are divisible by 2, 3, or 5?
"""
answer = 74
tolerance = 0
points = 20

[[solve.sub_problems.hints]]
cost = 5
text = "Let A = multiples of 2 (50), B = multiples of 3 (33), C = multiples of 5 (20). Compute intersections using LCMs."

[[solve.sub_problems.hints]]
