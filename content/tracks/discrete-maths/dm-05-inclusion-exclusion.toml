[[solve.sub_problems]]
kind = "numerical"
prompt = """
How many derangements of {1,2,3,4} are there? (Permutations where no element
remains in its original position.)
"""
answer = 9
tolerance = 0
points = 20

[[solve.sub_problems.hints]]
cost = 5
text = "D(4) = 4! * (1 - 1/1! + 1/2! - 1/3! + 1/4!) = 24*(1 - 1 + 1/2 - 1/6 + 1/24)."

[[solve.sub_problems.hints]]
cost = 10
text = "24 * (12/24 - 4/24 + 1/24) = 24 * 9/24 = 9."

[[solve.sub_problems]]
kind = "strategy_id"
prompt = """
You want to count permutations of {1,...,n} that avoid a specific pattern. The
direct count is hard, but counting those that DO contain the pattern and
subtracting from n! is easier. Which strategy does this exemplify?
"""
correct_strategy = "change-viewpoint"
distractors = ["symmetry", "invariant", "extreme-principle"]
explanation = """
Counting the complement and subtracting is a classic change of viewpoint.
Instead of counting what you want directly, count what you do not want and
subtract from the total.
"""
points = 10

[[solve.sub_problems]]
kind = "proof"
prompt = """
Prove the inclusion-exclusion formula for two sets:
|A Ôł¬ B| = |A| + |B| - |A Ôłę B|.
"""
solution_sketch = """
Partition A Ôł¬ B into three disjoint parts: A \\ B, B \\ A, and A Ôłę B.
Then |A Ôł¬ B| = |A \\ B| + |B \\ A| + |A Ôłę B|.
Since |A| = |A \\ B| + |A Ôłę B| and |B| = |B \\ A| + |A Ôłę B|, we get
|A| + |B| = |A \\ B| + |B \\ A| + 2|A Ôłę B|.
Subtracting |A Ôłę B| from both sides gives the result.
"""
points = 15

